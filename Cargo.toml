[package]
name = "asterline"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "asterline"
path = "src/main.rs"

# Short alias: launch with `ast` instead of `asterline`.
[[bin]]
name = "ast"
path = "src/main.rs"

[dependencies]
crossterm = "0.29"
portable-pty = "0.9"
ratatui = "0.30.2"
rusqlite = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
